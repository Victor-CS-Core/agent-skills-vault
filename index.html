<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Vault — Personal Agent Skill Library</title>
  <meta name="description" content="A local-first personal library for storing, browsing, and searching your favorite AI agent skills from GitHub and skills.sh.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --bg-surface: rgba(255 255 255 / 0.04);
      --bg-surface-hover: rgba(255 255 255 / 0.07);
      --border: rgba(255 255 255 / 0.08);
      --border-hover: rgba(255 255 255 / 0.16);
      --text-1: #f0f0ff;
      --text-2: #8888aa;
      --text-3: #444466;
      --purple: #7c3aed;
      --cyan: #06b6d4;
      --pink: #ec4899;
      --radius-card: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --blur: blur(24px);
      --t-fast: 150ms ease;
      --t-smooth: 280ms cubic-bezier(0.4,0,0.2,1);
      --t-spring: 400ms cubic-bezier(0.34,1.56,0.64,1);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Atmospheric glow layers */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -5%,  rgba(124,58,237,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 110%, rgba(6,182,212,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 50% 50%,  rgba(236,72,153,.04) 0%, transparent 70%);
    }

    #app { position: relative; z-index: 1; }

    /* ───── HEADER ───── */
    .header {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; gap: 16px;
      padding: 14px 28px;
      background: rgba(7,7,15,.85);
      backdrop-filter: var(--blur) saturate(180%);
      -webkit-backdrop-filter: var(--blur) saturate(180%);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
      text-decoration: none;
    }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      display: flex; align-items: center; justify-content: center; font-size: 17px;
      box-shadow: 0 0 18px rgba(124,58,237,.45);
    }
    .logo-name {
      font-size: 17px; font-weight: 700; letter-spacing: -.4px;
      background: linear-gradient(130deg, #f0f0ff, #a78bfa);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-search { flex: 1; max-width: 500px; margin: 0 auto; position: relative; }

    .search-ico {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
      transition: color var(--t-fast);
    }
    .header-search:focus-within .search-ico { color: var(--purple); }

    #search-input {
      width: 100%; padding: 10px 14px 10px 40px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); color: var(--text-1);
      font-family: inherit; font-size: 14px; outline: none;
      transition: all var(--t-smooth);
    }
    #search-input::placeholder { color: var(--text-3); }
    #search-input:focus {
      border-color: rgba(124,58,237,.5);
      background: rgba(255,255,255,.06);
      box-shadow: 0 0 0 3px rgba(124,58,237,.15), 0 0 20px rgba(124,58,237,.08);
    }

    .kbd-hint {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--text-3);
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 6px; font-family: 'JetBrains Mono', monospace;
      pointer-events: none;
    }

    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .skill-count { font-size: 13px; color: var(--text-3); white-space: nowrap; }
    .skill-count b { color: var(--text-2); font-weight: 600; }

    /* ───── BUTTONS ───── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 13.5px; font-weight: 500;
      cursor: pointer; transition: all var(--t-smooth); white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--purple), #9333ea);
      color: #fff;
      box-shadow: 0 4px 14px rgba(124,58,237,.35);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(124,58,237,.5);
      filter: brightness(1.1);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; pointer-events: none; }

    .btn-ghost {
      background: var(--bg-surface); color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-surface-hover); color: var(--text-1); border-color: var(--border-hover); }

    .icon-btn {
      width: 30px; height: 30px; padding: 0; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg-surface);
      color: var(--text-3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t-fast);
    }
    .icon-btn:hover { color: #f87171; border-color: rgba(239,68,68,.4); background: rgba(239,68,68,.1); }

    /* ───── VIEW TOGGLE ───── */
    .view-toggle {
      display: flex; align-items: center;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
    }
    .view-btn {
      width: 28px; height: 28px; padding: 0; border-radius: 5px;
      border: none; background: transparent;
      color: var(--text-3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t-fast);
      flex-shrink: 0;
    }
    .view-btn:hover { color: var(--text-2); background: rgba(255,255,255,.06); }
    .view-btn.active {
      background: linear-gradient(135deg, var(--purple), #9333ea);
      color: #fff;
      box-shadow: 0 2px 8px rgba(124,58,237,.4);
    }

    /* ───── MAIN GRID ───── */
    .main { padding: 28px; max-width: 1440px; margin: 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 18px;
    }

    /* ───── LIST VIEW ───── */
    .grid.list-view {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .grid.list-view .card {
      flex-direction: row;
      align-items: center;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      gap: 16px;
      animation: none;
    }
    .grid.list-view .card::before { display: none; }
    .grid.list-view .card-top {
      flex-shrink: 0;
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      width: 130px;
    }
    .grid.list-view .card-top .icon-btn { display: none; }
    .grid.list-view .card-title {
      font-size: 14.5px;
      margin-bottom: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      flex-shrink: 0;
      min-width: 140px;
    }
    .grid.list-view .card-desc {
      font-size: 12.5px;
      flex: 1;
      -webkit-line-clamp: 1;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-width: 0;
    }
    .grid.list-view .card-footer {
      flex-shrink: 0;
      margin-top: 0;
      padding-top: 0;
      border-top: none;
      border-left: 1px solid var(--border);
      padding-left: 16px;
      gap: 12px;
      align-items: center;
      min-width: 200px;
    }
    /* List view delete — always visible, smaller */
    .grid.list-view .card-delete {
      opacity: 0;
      position: static;
    }
    .grid.list-view .card:hover .card-delete { opacity: 1; }
    .grid.list-view .copy-pill {
      opacity: 0;
    }
    .grid.list-view .card:hover .copy-pill { opacity: 1; }
    .grid.list-view .copy-pill.copied { opacity: 1 !important; }

    /* ───── SKILL CARD ───── */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 22px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: transform var(--t-smooth), box-shadow var(--t-smooth),
                  border-color var(--t-smooth), background var(--t-smooth);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column; gap: 0;
      animation: card-in var(--t-spring) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(18px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    /* Stagger */
    .card:nth-child(1)  { animation-delay:  0ms }
    .card:nth-child(2)  { animation-delay: 35ms }
    .card:nth-child(3)  { animation-delay: 70ms }
    .card:nth-child(4)  { animation-delay:105ms }
    .card:nth-child(5)  { animation-delay:140ms }
    .card:nth-child(6)  { animation-delay:175ms }
    .card:nth-child(7)  { animation-delay:210ms }
    .card:nth-child(8)  { animation-delay:245ms }
    .card:nth-child(n+9){ animation-delay:280ms }

    .card:hover {
      transform: translateY(-5px);
      background: var(--bg-surface-hover);
      border-color: var(--border-hover);
    }
    /* Per-category glow on hover */
    .card[data-cat="engineering"]:hover { box-shadow: 0 20px 55px rgba(0,0,0,.45), 0 0 40px rgba(6,182,212,.1); }
    .card[data-cat="productivity"]:hover { box-shadow: 0 20px 55px rgba(0,0,0,.45), 0 0 40px rgba(168,85,247,.1); }
    .card[data-cat="misc"]:hover { box-shadow: 0 20px 55px rgba(0,0,0,.45), 0 0 40px rgba(245,158,11,.1); }
    .card[data-cat="personal"]:hover { box-shadow: 0 20px 55px rgba(0,0,0,.45), 0 0 40px rgba(236,72,153,.1); }
    .card[data-cat="in-progress"]:hover { box-shadow: 0 20px 55px rgba(0,0,0,.45), 0 0 40px rgba(16,185,129,.1); }

    /* Shimmer accent bar at top */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      opacity: 0; transition: opacity var(--t-smooth);
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--pink));
    }
    .card:hover::before { opacity: 1; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge {
      padding: 3px 9px; border-radius: 6px;
      font-size: 10.5px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
    }
    .badge-engineering { background: rgba(6,182,212,.15);  color: #22d3ee; border: 1px solid rgba(6,182,212,.25); }
    .badge-productivity { background: rgba(168,85,247,.15); color: #c084fc; border: 1px solid rgba(168,85,247,.25); }
    .badge-misc         { background: rgba(245,158,11,.15); color: #fbbf24; border: 1px solid rgba(245,158,11,.25); }
    .badge-personal     { background: rgba(236,72,153,.15); color: #f472b6; border: 1px solid rgba(236,72,153,.25); }
    .badge-in-progress  { background: rgba(16,185,129,.15); color: #34d399; border: 1px solid rgba(16,185,129,.25); }
    .badge-deprecated   { background: rgba(107,114,128,.15);color: #9ca3af; border: 1px solid rgba(107,114,128,.25); }
    .badge-manual       { background: rgba(251,146,60,.15); color: #fb923c; border: 1px solid rgba(251,146,60,.25); }
    .badge-default      { background: rgba(129,140,248,.15);color: #a5b4fc; border: 1px solid rgba(129,140,248,.25); }

    .card-delete {
      opacity: 0; transition: opacity var(--t-fast);
    }
    .card:hover .card-delete { opacity: 1; }

    .card-title {
      font-size: 16.5px; font-weight: 700; color: var(--text-1);
      letter-spacing: -.3px; line-height: 1.3; margin-bottom: 9px;
    }

    .card-desc {
      font-size: 13px; color: var(--text-2); line-height: 1.65;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-source {
      display: flex; align-items: center; gap: 5px;
      font-size: 11.5px; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
    }
    .card-time { font-size: 11px; color: var(--text-3); }

    /* ───── COPY PILL ───── */
    .copy-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      border: 1px solid rgba(124,58,237,.3);
      background: rgba(124,58,237,.1);
      color: #a78bfa;
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      cursor: pointer; white-space: nowrap;
      opacity: 0;
      transform: translateY(2px);
      transition: opacity var(--t-fast), transform var(--t-fast),
                  background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
      user-select: none;
    }
    .card:hover .copy-pill {
      opacity: 1;
      transform: none;
    }
    .copy-pill:hover {
      background: rgba(124,58,237,.22);
      border-color: rgba(124,58,237,.55);
      color: #c4b5fd;
    }
    .copy-pill.copied {
      background: rgba(16,185,129,.15);
      border-color: rgba(16,185,129,.4);
      color: #34d399;
      opacity: 1 !important;
      transform: none !important;
    }

    /* ───── COPY TOAST ───── */
    #copy-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(16,185,129,.18);
      border: 1px solid rgba(16,185,129,.4);
      color: #34d399;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13.5px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms ease, transform 200ms ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 40px rgba(16,185,129,.12);
      white-space: nowrap;
    }
    #copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ───── EMPTY STATE ───── */
    .empty {
      grid-column: 1/-1;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 62vh;
      text-align: center; padding: 40px;
      animation: fade-up 500ms ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }
    .empty-orb {
      width: 116px; height: 116px; border-radius: 50%; margin-bottom: 28px;
      background: radial-gradient(circle at 38% 38%, rgba(124,58,237,.35), rgba(6,182,212,.12) 60%, transparent);
      border: 1px solid rgba(124,58,237,.2);
      display: flex; align-items: center; justify-content: center; font-size: 46px;
      box-shadow: 0 0 60px rgba(124,58,237,.18);
      animation: orb-pulse 4s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%,100% { box-shadow: 0 0 50px rgba(124,58,237,.15); }
      50%      { box-shadow: 0 0 80px rgba(124,58,237,.28), 0 0 140px rgba(124,58,237,.08); }
    }
    .empty h2 { font-size: 24px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 10px; }
    .empty p  { font-size: 14.5px; color: var(--text-2); max-width: 400px; margin-bottom: 26px; line-height: 1.7; }
    .empty-chips { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .chip {
      padding: 6px 13px; background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 7px; font-size: 12px; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
    }

    .no-results {
      grid-column: 1/-1; text-align: center; padding: 60px 40px;
      color: var(--text-3); font-size: 15px;
      animation: fade-up 250ms ease;
    }
    .no-results strong { display: block; font-size: 19px; color: var(--text-2); margin-bottom: 8px; font-weight: 600; }

    /* ───── MODALS ───── */
    .overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: overlay-in 180ms ease;
    }
    @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: rgba(9,9,22,.97);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 22px;
      width: 100%; max-width: 560px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 80px rgba(124,58,237,.07);
      animation: modal-in 360ms cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(.9) translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    .modal-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 26px 0;
    }
    .modal-hd h2 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }

    .close-btn {
      width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg-surface);
      color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      transition: all var(--t-fast);
    }
    .close-btn:hover { color: var(--text-1); border-color: var(--border-hover); background: var(--bg-surface-hover); }

    .modal-bd { padding: 18px 26px 26px; }

    .fg { margin-bottom: 15px; }
    .fg label {
      display: block; font-size: 12.5px; font-weight: 500;
      color: var(--text-2); margin-bottom: 6px;
    }
    .fg label span { color: var(--text-3); font-weight: 400; }

    .form-ctrl {
      width: 100%; padding: 11px 13px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: var(--radius-md); color: var(--text-1);
      font-family: inherit; font-size: 13.5px; outline: none;
      transition: all var(--t-smooth);
    }
    .form-ctrl:focus {
      border-color: rgba(124,58,237,.5);
      background: rgba(255,255,255,.06);
      box-shadow: 0 0 0 3px rgba(124,58,237,.14);
    }
    textarea.form-ctrl { resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
    .hint { margin-top: 5px; font-size: 11.5px; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0; font-size: 12px; color: var(--text-3);
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .status-box {
      margin-top: 14px; padding: 13px 14px; border-radius: var(--radius-md);
      font-size: 13px; display: flex; align-items: flex-start; gap: 10px;
      line-height: 1.5;
    }
    .status-box.loading { background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.2); color: #a78bfa; }
    .status-box.success { background: rgba(16,185,129,.1);  border: 1px solid rgba(16,185,129,.2);  color: #34d399; }
    .status-box.error   { background: rgba(239,68,68,.1);   border: 1px solid rgba(239,68,68,.2);   color: #fca5a5; }

    .spinner {
      width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid rgba(167,139,250,.3); border-top-color: #a78bfa;
      border-radius: 50%; animation: spin .65s linear infinite; margin-top: 1px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ───── DETAIL MODAL ───── */
    .detail-modal {
      max-width: 800px; max-height: 90vh;
      display: flex; flex-direction: column;
    }
    .detail-hd {
      flex-shrink: 0; padding: 24px 28px 18px;
      border-bottom: 1px solid var(--border);
    }
    .detail-hd-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .detail-title { font-size: 21px; font-weight: 700; letter-spacing: -.4px; }
    .detail-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace;
    }
    .detail-meta a { color: #818cf8; text-decoration: none; }
    .detail-meta a:hover { text-decoration: underline; }

    .detail-body {

<script type="module">
'use strict';

// ═══════════════════════════════════════════════════════
//  Toast helper
// ═══════════════════════════════════════════════════════
let _toastTimer = null;
function showCopyToast(skillName) {
  const toast = document.getElementById('copy-toast');
  toast.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied <strong>${skillName}</strong> install command`;
  toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════
//  SkillStore — IndexedDB persistence layer
// ═══════════════════════════════════════════════════════
const SkillStore = (() => {
  const DB = 'skill-vault-v1', VER = 1, ST = 'skills';
  let _db = null;

  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((ok, fail) => {
      const r = indexedDB.open(DB, VER);
      r.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(ST)) db.createObjectStore(ST, { keyPath: 'id' });
      };
      r.onsuccess = e => { _db = e.target.result; ok(_db); };
      r.onerror   = e => fail(e.target.error);
    });
  }

  async function getAll() {
    const db = await open();
    return new Promise((ok, fail) => {
      const r = db.transaction(ST, 'readonly').objectStore(ST).getAll();
      r.onsuccess = () => ok(r.result ?? []);
      r.onerror   = e => fail(e.target.error);
    });
  }

  async function add(skill) {
    const all = await getAll();
    if (all.find(s => s.name === skill.name && s.source === skill.source))
      throw new Error(`"${skill.name}" from ${skill.source} is already in your library`);
    const record = { ...skill, id: crypto.randomUUID(), addedAt: new Date().toISOString() };
    const db = await open();
    return new Promise((ok, fail) => {
      const r = db.transaction(ST, 'readwrite').objectStore(ST).add(record);
      r.onsuccess = () => ok(record);
      r.onerror   = e => fail(e.target.error);
    });
  }

  async function remove(id) {
    const db = await open();
    return new Promise((ok, fail) => {
      const r = db.transaction(ST, 'readwrite').objectStore(ST).delete(id);
      r.onsuccess = () => ok();
      r.onerror   = e => fail(e.target.error);
    });
  }

  function search(skills, q) {
    if (!q.trim()) return skills;
    const lq = q.toLowerCase();
    return skills.filter(s =>
      (s.name        ?? '').toLowerCase().includes(lq) ||
      (s.description ?? '').toLowerCase().includes(lq) ||
      (s.category    ?? '').toLowerCase().includes(lq) ||
      (s.source      ?? '').toLowerCase().includes(lq)
    );
  }

  return { getAll, add, remove, search };
})();

// ═══════════════════════════════════════════════════════
//  Frontmatter parser
// ═══════════════════════════════════════════════════════
function parseFM(raw) {
  const m = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!m) return { fm: {}, body: raw.trim() };
  const fm = {};
  for (const line of m[1].split(/\r?\n/)) {
    const i = line.indexOf(':');
    if (i < 0) continue;
    fm[line.slice(0, i).trim()] = line.slice(i + 1).trim();
  }
  return { fm, body: m[2].trim() };
}

// ═══════════════════════════════════════════════════════
//  GitHub import pipeline
// ═══════════════════════════════════════════════════════
function parseURL(raw) {
  const str = raw.trim();
  let url;
  try { url = new URL(str); } catch { throw new Error('Not a valid URL'); }

  const { hostname, pathname } = url;
  const parts = pathname.split('/').filter(Boolean);

  if (hostname === 'raw.githubusercontent.com') {
    // raw.githubusercontent.com/owner/repo/branch/...path
    if (parts.length < 4) throw new Error('Raw URL needs at least owner/repo/branch/path');
    return { type: 'raw', owner: parts[0], repo: parts[1], branch: parts[2], path: parts.slice(3).join('/') };
  }

  if (hostname === 'github.com' || hostname === 'www.github.com') {
    if (parts.length < 2) throw new Error('Need at least github.com/owner/repo');
    const [owner, repo] = parts;
    if (parts[2] === 'tree' && parts.length > 4) {
      return { type: 'path', owner, repo, branch: parts[3], path: parts.slice(4).join('/') };
    }
    if (parts[2] === 'blob' && parts.length > 4) {
      return { type: 'path', owner, repo, branch: parts[3], path: parts.slice(4).join('/') };
    }
    return { type: 'repo', owner, repo };
  }

  if (hostname === 'skills.sh' || hostname === 'www.skills.sh') {
    // skills.sh/owner/repo
    if (parts.length >= 2) return { type: 'repo', owner: parts[0], repo: parts[1] };
    throw new Error('skills.sh URL needs owner/repo');
  }

  throw new Error(`Unrecognized host: ${hostname}`);
}

function catFromPath(p) {
  const parts = p.split('/');
  return (parts[0] === 'skills' && parts.length >= 3) ? parts[1] : 'misc';
}
function nameFromPath(p) {
  const parts = p.split('/');
  return parts[parts.length - 2] || parts[parts.length - 1].replace(/\.md$/i, '');
}

async function fetchRaw(owner, repo, path, branch = 'main') {
  const url = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} fetching ${url}`);
  return { rawUrl: url, text: await r.text() };
}

function hydrate(owner, repo, skillPath, rawUrl, fm, body) {
  return {
    name:        fm.name        || nameFromPath(skillPath),
    description: fm.description || '',
    category:    catFromPath(skillPath),
    source:      `${owner}/${repo}`,
    sourceType:  'github',
    skillPath,
    rawUrl,
    body,
  };
}

async function importFromRepo(owner, repo, filter = '', branch = 'main') {
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
  const r = await fetch(apiUrl);
  if (!r.ok) {
    const txt = await r.text().catch(() => '');
    throw new Error(`GitHub API ${r.status}${txt ? ': ' + txt : ''}`);
  }
  const data = await r.json();

  let paths = data.tree
    .filter(n => n.type === 'blob' && n.path.endsWith('/SKILL.md') && !n.path.includes('/deprecated/'))
    .map(n => n.path);

  if (filter.trim()) {
    const f = filter.trim().toLowerCase();
    paths = paths.filter(p => nameFromPath(p).toLowerCase() === f || nameFromPath(p).toLowerCase().includes(f));
  }

  if (paths.length === 0)
    throw new Error(`No skills found in ${owner}/${repo}${filter ? ` matching "${filter}"` : ''}. Check the repo structure.`);

  const results = [];
  for (const skillPath of paths) {
    try {
      const { rawUrl, text } = await fetchRaw(owner, repo, skillPath, branch);
      const { fm, body } = parseFM(text);
      const skill = hydrate(owner, repo, skillPath, rawUrl, fm, body);
      const record = await SkillStore.add(skill);
      results.push({ ok: true, record });
    } catch (e) {
      results.push({ ok: false, error: e.message });
    }
  }
  return results;
}

// ═══════════════════════════════════════════════════════
//  UI helpers
// ═══════════════════════════════════════════════════════
const esc = s => (s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function badgeCls(cat) {
  const map = { engineering:'badge-engineering', productivity:'badge-productivity',
    misc:'badge-misc', personal:'badge-personal', 'in-progress':'badge-in-progress',
    deprecated:'badge-deprecated', manual:'badge-manual' };
  return map[cat] ?? 'badge-default';
}

function ago(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)   return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400)return `${Math.floor(s/3600)}h ago`;
  if (s < 2592000) return `${Math.floor(s/86400)}d ago`;
  return new Date(iso).toLocaleDateString();
}

const GH_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
  <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57
    0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695
    -.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99
    .105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225
    -.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405
    c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225
    0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3
    0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
</svg>`;

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
let allSkills = [];
let query = '';
let viewMode = 'card'; // 'card' | 'list'

function applyViewMode() {
  const grid = document.getElementById('skill-grid');
  const cardBtn = document.getElementById('view-card');
  const listBtn = document.getElementById('view-list');
  if (viewMode === 'list') {
    grid.classList.add('list-view');
    listBtn.classList.add('active');
    cardBtn.classList.remove('active');
  } else {
    grid.classList.remove('list-view');
    cardBtn.classList.add('active');
    listBtn.classList.remove('active');
  }
  try { localStorage.setItem('skill-vault-view', viewMode); } catch {}
}

// ═══════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('skill-grid');
  const filtered = SkillStore.search(allSkills, query);
  grid.innerHTML = '';

  const countEl = document.getElementById('skill-count');
  countEl.innerHTML = allSkills.length > 0
    ? `<b>${filtered.length}</b> of <b>${allSkills.length}</b> skills`
    : '';

  if (allSkills.length === 0) {
    grid.innerHTML = `
      <div class="empty" role="status">
        <div class="empty-orb" aria-hidden="true">⚡</div>
        <h2>Your vault is empty</h2>
        <p>Import skills from GitHub repos or skills.sh to build your personal AI agent skill library.</p>
        <div class="empty-chips">
          <span class="chip">github.com/mattpocock/skills</span>
          <span class="chip">skills.sh/&lt;owner&gt;/&lt;repo&gt;</span>
        </div>
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results"><strong>No skills found</strong>Try a different search term</div>`;
    return;
  }

  const sorted = [...filtered].sort((a, b) => new Date(b.addedAt) - new Date(a.addedAt));
  sorted.forEach(skill => grid.appendChild(makeCard(skill)));
}

function makeCard(skill) {
  const el = document.createElement('article');
  el.className = 'card';
  el.dataset.cat = skill.category ?? 'misc';
  el.setAttribute('role', 'listitem');
  el.setAttribute('tabindex', '0');
  el.setAttribute('aria-label', `${skill.name} skill`);

  el.innerHTML = `
    <div class="card-top">
      <div class="badges">
        <span class="badge ${badgeCls(skill.category)}">${esc(skill.category ?? 'misc')}</span>
        ${skill.sourceType === 'manual' ? '<span class="badge badge-manual">manual</span>' : ''}
      </div>
      <button class="icon-btn card-delete" data-id="${esc(skill.id)}" aria-label="Delete ${esc(skill.name)}" title="Remove from library">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
    <div class="card-title">${esc(skill.name)}</div>
    <div class="card-desc">${esc(skill.description || 'No description available.')}</div>
    <div class="card-footer">
      <div class="card-source">${GH_SVG}&nbsp;${esc(skill.source ?? 'unknown')}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="card-time">${ago(skill.addedAt)}</span>
        ${skill.sourceType === 'github' ? `
        <button class="copy-pill" title="Copy install command" aria-label="Copy npx install command">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          npx install
        </button>` : ''}
      </div>
    </div>`;

  el.addEventListener('click', e => { if (!e.target.closest('.card-delete') && !e.target.closest('.copy-pill')) openDetail(skill); });
  el.addEventListener('keydown', e => { if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.card-delete') && !e.target.closest('.copy-pill')) { e.preventDefault(); openDetail(skill); } });

  if (skill.sourceType === 'github') {
    el.querySelector('.copy-pill').addEventListener('click', async e => {
      e.stopPropagation();
      const pill = e.currentTarget;   // capture BEFORE any await
      const cmd = `npx skills add https://github.com/${skill.source} --skill ${skill.name}`;
      try {
        await navigator.clipboard.writeText(cmd);
      } catch {
        // Fallback for non-secure contexts
        const ta = document.createElement('textarea');
        ta.value = cmd; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      pill.classList.add('copied');
      pill.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      showCopyToast(skill.name);
      setTimeout(() => {
        pill.classList.remove('copied');
        pill.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> npx install`;
      }, 1800);
    });
  }

  el.querySelector('.card-delete').addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`Remove "${skill.name}" from your vault?`)) return;
    await SkillStore.remove(skill.id);
    allSkills = allSkills.filter(s => s.id !== skill.id);
    renderGrid();
  });

  return el;
}

// ═══════════════════════════════════════════════════════
//  Detail modal
// ═══════════════════════════════════════════════════════
function openDetail(skill) {
  document.getElementById('d-badges').innerHTML =
    `<span class="badge ${badgeCls(skill.category)}">${esc(skill.category ?? 'misc')}</span>`;
  document.getElementById('d-title').textContent = skill.name;
  document.getElementById('d-meta').innerHTML =
    `${GH_SVG}&nbsp;${esc(skill.source ?? 'unknown')}` +
    (skill.rawUrl ? `&ensp;·&ensp;<a href="${esc(skill.rawUrl)}" target="_blank" rel="noopener noreferrer">View source ↗</a>` : '') +
    `&ensp;·&ensp;Added ${ago(skill.addedAt)}`;

  const body = skill.body || '*No skill content available.*';
  document.getElementById('d-body').innerHTML = marked.parse(body);

  document.getElementById('detail-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  document.getElementById('detail-close').focus();
}

function closeDetail() {
  document.getElementById('detail-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════════════
//  Import modal
// ═══════════════════════════════════════════════════════
function openImport() {
  document.getElementById('import-overlay').style.display = 'flex';
  document.getElementById('url-input').focus();
  document.body.style.overflow = 'hidden';
}

function closeImport() {
  document.getElementById('import-overlay').style.display = 'none';
  document.body.style.overflow = '';
  setStatus(null);
}

function setStatus(type, html) {
  const el = document.getElementById('import-status');
  if (!type) { el.style.display = 'none'; el.innerHTML = ''; return; }
  el.className = `status-box ${type}`;
  el.innerHTML = html;
  el.style.display = 'flex';
}

async function doImport() {
  const raw   = document.getElementById('url-input').value.trim();
  const filter = document.getElementById('skill-filter').value.trim();
  if (!raw) { setStatus('error', '<span>⚠ Please enter a URL</span>'); return; }

  const fetchBtn = document.getElementById('fetch-btn');
  fetchBtn.disabled = true;
  setStatus('loading', '<div class="spinner"></div><span>Parsing URL…</span>');

  try {
    let parsed;
    try { parsed = parseURL(raw); }
    catch (e) { setStatus('error', `<span>⚠ ${esc(e.message)}</span>`); return; }

    let results = [];

    if (parsed.type === 'raw') {
      setStatus('loading', '<div class="spinner"></div><span>Fetching SKILL.md…</span>');
      const res = await fetch(raw);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const { fm, body } = parseFM(text);
      const skill = hydrate(parsed.owner, parsed.repo, parsed.path, raw, fm, body);
      const record = await SkillStore.add(skill);
      results = [{ ok: true, record }];

    } else if (parsed.type === 'path') {
      setStatus('loading', '<div class="spinner"></div><span>Fetching skill…</span>');
      const skillPath = parsed.path.toLowerCase().endsWith('skill.md')
        ? parsed.path : `${parsed.path}/SKILL.md`;
      const { rawUrl, text } = await fetchRaw(parsed.owner, parsed.repo, skillPath, parsed.branch);
      const { fm, body } = parseFM(text);
      const skill = hydrate(parsed.owner, parsed.repo, skillPath, rawUrl, fm, body);
      const record = await SkillStore.add(skill);
      results = [{ ok: true, record }];

    } else {
      setStatus('loading', `<div class="spinner"></div><span>Scanning ${esc(parsed.owner)}/${esc(parsed.repo)}…</span>`);
      results = await importFromRepo(parsed.owner, parsed.repo, filter);
    }

    const ok   = results.filter(r => r.ok);
    const fail = results.filter(r => !r.ok);

    if (ok.length === 0 && fail.length > 0) {
      const msgs = fail.map(r => esc(r.error)).join('<br>');
      setStatus('error', `<span>⚠ All imports failed:<br>${msgs}</span>`);
    } else {
      const names = ok.map(r => `<strong>${esc(r.record.name)}</strong>`).join(', ');
      const note  = fail.length > 0
        ? `<br><span style="font-size:11.5px;opacity:.65">${fail.length} skipped (already in library or error)</span>`
        : '';
      setStatus('success', `<span>✓ Imported ${ok.length} skill${ok.length !== 1 ? 's' : ''}: ${names}${note}</span>`);
      allSkills = await SkillStore.getAll();
      renderGrid();
    }
  } catch (e) {
    setStatus('error', `<span>⚠ ${esc(e.message)}</span>`);
  } finally {
    fetchBtn.disabled = false;
  }
}

async function doManual() {
  const name = document.getElementById('m-name').value.trim();
  const desc = document.getElementById('m-desc').value.trim();
  const cat  = document.getElementById('m-cat').value.trim()  || 'misc';
  const src  = document.getElementById('m-src').value.trim()  || 'manual';
  const body = document.getElementById('m-body').value.trim();

  if (!name) { alert('Skill name is required.'); return; }

  try {
    await SkillStore.add({ name, description: desc, category: cat, source: src, sourceType: 'manual', skillPath: '', rawUrl: '', body });
    allSkills = await SkillStore.getAll();
    renderGrid();
    closeImport();
    ['m-name','m-desc','m-cat','m-src','m-body'].forEach(id => { document.getElementById(id).value = ''; });
  } catch (e) {
    alert(e.message);
  }
}

// ═══════════════════════════════════════════════════════
//  Event wiring
// ═══════════════════════════════════════════════════════
document.getElementById('import-btn').addEventListener('click', openImport);
document.getElementById('import-close').addEventListener('click', closeImport);
document.getElementById('import-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeImport(); });

document.getElementById('fetch-btn').addEventListener('click', doImport);
document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') doImport(); });
document.getElementById('manual-btn').addEventListener('click', doManual);

document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

document.getElementById('search-input').addEventListener('input', e => {
  query = e.target.value;
  renderGrid();
});

document.getElementById('view-card').addEventListener('click', () => {
  if (viewMode === 'card') return;
  viewMode = 'card';
  applyViewMode();
});

document.getElementById('view-list').addEventListener('click', () => {
  if (viewMode === 'list') return;
  viewMode = 'list';
  applyViewMode();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeImport(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
    document.getElementById('search-input').select();
  }
});

// ═══════════════════════════════════════════════════════
//  Bootstrap
// ═══════════════════════════════════════════════════════
(async () => {
  // Restore saved view preference
  try {
    const saved = localStorage.getItem('skill-vault-view');
    if (saved === 'list' || saved === 'card') viewMode = saved;
  } catch {}
  applyViewMode();

  try {
    allSkills = await SkillStore.getAll();
  } catch (e) {
    console.error('SkillStore init failed:', e);
    allSkills = [];
  }
  renderGrid();
})();
</script>
</body>
</html>
